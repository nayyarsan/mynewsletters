name: AI Newsletter

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday 6am PST (UTC-8) / 7am PDT (UTC-7)
  workflow_dispatch:         # Manual trigger for testing

permissions:
  contents: read
  models: read
  packages: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:

  validate:
    runs-on: ubuntu-latest
    outputs:
      active_sources: ${{ steps.validate.outputs.active_sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate feeds
        id: validate
        run: python pipeline/validate_feeds.py
      - uses: actions/upload-artifact@v4
        with:
          name: feed-health
          path: feed_health.json

  fetch:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        source: ${{ fromJson(needs.validate.outputs.active_sources) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch source
        run: python pipeline/fetch.py --source "${{ matrix.source }}" --output-dir data/raw
      - uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.source }}
          path: data/raw/${{ matrix.source }}.json
          if-no-files-found: warn

  normalize:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          merge-multiple: true
          path: data/raw/
      - name: Normalize stories
        run: python pipeline/normalize.py
      - uses: actions/upload-artifact@v4
        with:
          name: normalized
          path: data/normalized.json

  rank:
    needs: normalize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: normalized
          path: data/
      - name: Rank stories
        run: python pipeline/rank.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: ranked
          path: data/ranked.json

  summarize:
    needs: rank
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: ranked
          path: data/
      - name: Restore summary cache
        uses: actions/cache@v4
        with:
          path: data/summary_cache.json
          key: summary-cache-v1-${{ github.run_id }}
          restore-keys: |
            summary-cache-v1-
      - name: Summarize stories
        run: python pipeline/summarize.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: summarized
          path: data/summarized.json

  deliver:
    needs: summarize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: summarized
          path: data/
      - name: Deliver to Telegram
        run: python pipeline/deliver.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  publish:
    needs: deliver
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: ranked
          path: data/
      - name: Generate rdradar.json
        run: python pipeline/publish.py
      - name: Commit rdradar.json to output branch
        run: |
          cp data/rdradar.json /tmp/rdradar.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout -B output origin/output 2>/dev/null || (git checkout --orphan output && git rm -rf . 2>/dev/null || true)
          mkdir -p data
          cp /tmp/rdradar.json data/rdradar.json
          git add data/rdradar.json
          git diff --staged --quiet || git commit -m "chore: update rdradar.json [skip ci]"
          git push origin output
