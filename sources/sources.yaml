sources:
  # --- INFLUENCERS ---
  - name: karpathy
    display_name: "Andrej Karpathy"
    type: rss
    url: "https://karpathy.github.io/feed.xml"
    weight: high

  - name: demis_hassabis
    display_name: "Demis Hassabis (DeepMind)"
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    weight: high

  - name: meta_engineering
    display_name: "Meta Engineering (Yann LeCun)"
    type: rss
    url: "https://engineering.fb.com/feed/"
    weight: high

  # --- COMPANY BLOGS ---
  - name: github_blog
    display_name: "GitHub Blog (AI)"
    type: rss
    url: "https://github.blog/feed/"
    filter_keywords: ["copilot", "ai", "models", "actions", "agent"]
    weight: high

  - name: github_copilot_changelog
    display_name: "GitHub Copilot Changelog"
    type: rss
    url: "https://github.blog/changelog/feed/"
    filter_keywords: ["copilot", "ai", "models"]
    weight: high

  - name: vscode
    display_name: "VS Code"
    type: rss
    url: "https://code.visualstudio.com/feed.xml"
    filter_keywords: ["ai", "copilot", "agent", "edit"]
    weight: high

  - name: openai
    display_name: "OpenAI"
    type: rss
    url: "https://openai.com/news/rss.xml"
    filter_keywords: ["api", "model", "release", "agent", "developer", "codex", "gpt", "o1", "o3", "o4", "sdk", "responses", "security", "enterprise"]
    weight: high

  - name: google_deepmind
    display_name: "Google DeepMind"
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    weight: high

  - name: microsoft_ai
    display_name: "Microsoft AI Research"
    type: rss
    url: "https://www.microsoft.com/en-us/research/blog/feed/"
    filter_keywords: ["ai", "llm", "agent", "copilot", "model", "developer"]
    weight: high

  - name: m365_dev
    display_name: "Microsoft 365 Dev Blog"
    type: rss
    url: "https://devblogs.microsoft.com/microsoft365dev/feed/"
    filter_keywords: ["copilot", "agent", "api", "teams", "graph", "extension", "plugin", "ai"]
    weight: high

  - name: windsurf
    display_name: "Windsurf (Codeium)"
    type: rss
    url: "https://codeium.com/feed.xml"
    weight: high

  - name: huggingface
    display_name: "Hugging Face"
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    weight: medium

  - name: salesforce_ai
    display_name: "Salesforce AI"
    type: rss
    url: "https://www.salesforce.com/blog/category/ai/feed/"
    filter_keywords: ["agentforce", "einstein", "api", "release", "developer", "platform", "integration"]
    weight: medium

  - name: import_ai
    display_name: "Import AI (Jack Clark)"
    type: rss
    url: "https://jack-clark.net/feed/"
    weight: medium

  - name: pragmatic_engineer
    display_name: "The Pragmatic Engineer"
    type: rss
    url: "https://newsletter.pragmaticengineer.com/feed"
    filter_keywords: ["ai", "agent", "llm", "copilot", "claude", "gpt", "developer", "engineering", "coding", "model"]
    weight: high

  - name: latent_space
    display_name: "Latent Space"
    type: rss
    url: "https://www.latent.space/feed"
    weight: medium

  - name: simon_willison
    display_name: "Simon Willison"
    type: rss
    url: "https://simonwillison.net/atom/everything/"
    weight: medium

  - name: kdnuggets
    display_name: "KDNuggets"
    type: rss
    url: "https://www.kdnuggets.com/feed"
    filter_keywords: ["llm", "agent", "production", "enterprise", "api", "deployment", "fine-tuning", "rag"]
    weight: medium

  - name: towards_data_science
    display_name: "Towards Data Science"
    type: rss
    url: "https://towardsdatascience.com/feed"
    filter_keywords: ["enterprise", "production", "llm", "agent", "copilot", "deployment"]
    weight: medium

  - name: sap_ai
    display_name: "SAP AI"
    type: rss
    url: "https://news.sap.com/feed/"
    filter_keywords: ["ai", "joule", "copilot", "agent", "intelligence"]
    weight: medium

  - name: azure_ai
    display_name: "Azure AI"
    type: rss
    url: "https://azure.microsoft.com/en-us/blog/feed/"
    filter_keywords: ["ai", "copilot", "openai", "cognitive", "foundry"]
    weight: medium

  - name: langchain
    display_name: "LangChain"
    type: rss
    url: "https://blog.langchain.dev/rss/"
    filter_keywords: ["release", "launch", "sdk", "api", "update", "cli", "changelog", "langgraph", "langsmith", "agent"]
    weight: medium

  - name: nvidia_ai
    display_name: "NVIDIA AI Blog"
    type: rss
    url: "https://blogs.nvidia.com/feed/"
    filter_keywords: ["ai", "llm", "enterprise", "inference", "gpu"]
    weight: medium

  - name: aws_ml
    display_name: "AWS Machine Learning"
    type: rss
    url: "https://aws.amazon.com/blogs/machine-learning/feed/"
    weight: medium

  - name: the_decoder
    display_name: "The Decoder"
    type: rss
    url: "https://the-decoder.com/feed/"
    weight: high

  - name: interconnects
    display_name: "Interconnects (Ryan Greenfield)"
    type: rss
    url: "https://www.interconnects.ai/feed"
    weight: medium

  - name: last_week_in_ai
    display_name: "Last Week in AI"
    type: rss
    url: "https://lastweekin.ai/feed"
    filter_keywords: ["ai", "llm", "model", "agent", "gpt", "claude", "gemini"]
    weight: medium

  - name: google_ai_blog
    display_name: "Google AI Blog"
    type: rss
    url: "https://blog.google/technology/ai/rss/"
    filter_keywords: ["llm", "gemini", "agent", "enterprise", "developer", "api", "inference", "coding", "workspace"]
    weight: medium

  - name: lex_fridman
    display_name: "Lex Fridman Podcast"
    type: rss
    url: "https://lexfridman.com/feed/podcast/"
    weight: low

  # --- SCRAPE SOURCES ---
  - name: andrew_ng
    display_name: "Andrew Ng (The Batch)"
    type: scrape
    url: "https://www.deeplearning.ai/the-batch/"
    weight: high

  - name: anthropic
    display_name: "Anthropic"
    type: scrape
    url: "https://www.anthropic.com/news"
    weight: high
    selectors:
      list: "[class*='PublicationList-module'] a[href*='/news/']"
      title: "[class*='__title'], h2, h3"
      date: "time"

  - name: anthropic_engineering
    display_name: "Anthropic Engineering"
    type: scrape
    url: "https://www.anthropic.com/engineering"
    weight: high
    selectors:
      list: "a[class*='cardLink']"
      title: "h2, h3"
      date: "div[class*='date'], time"

  - name: claude_blog
    display_name: "Claude Blog"
    type: scrape
    url: "https://www.claude.com/blog"
    weight: high
    selectors:
      list: ".blog_cms_list article"
      title: ".card_blog_list_title, h2, h3"
      link: "a.clickable_link, a"
      date: "[fs-list-field='date'], time"

  # claude_code_changelog skipped — code.claude.com is fully JS-rendered, static scraper returns no headings

  - name: cognition
    display_name: "Cognition (Devin)"
    type: scrape
    url: "https://cognition.ai/blog"
    weight: high

  - name: cursor
    display_name: "Cursor"
    type: scrape
    url: "https://www.cursor.com/blog"
    weight: high

  - name: thinking_machines
    display_name: "Thinking Machines (Mira Murati)"
    type: scrape
    url: "https://www.thinkingmachines.ai/blog"
    weight: high

  - name: mistral
    display_name: "Mistral AI"
    type: scrape
    url: "https://mistral.ai/news/"
    weight: medium

  - name: tldr_ai
    display_name: "TLDR AI"
    type: scrape
    url: "https://tldr.tech/ai"
    weight: medium

  # --- API SOURCES ---
  - name: hackernews
    display_name: "Hacker News AI"
    type: api
    url: "https://hn.algolia.com/api/v1/search"
    params:
      tags: "story"
      query: "AI enterprise"
      hitsPerPage: 30
    weight: medium

  # --- REDDIT RSS ---
  - name: reddit_ainews
    display_name: "r/AINews"
    type: reddit
    url: "https://www.reddit.com/r/AINews/top/.rss?t=week"
    weight: medium

  - name: reddit_promptengineering
    display_name: "r/promptengineering"
    type: reddit
    url: "https://www.reddit.com/r/promptengineering/top/.rss?t=week"
    weight: medium

  - name: reddit_llmdevs
    display_name: "r/LLMDevs"
    type: reddit
    url: "https://www.reddit.com/r/LLMDevs/top/.rss?t=week"
    weight: medium

  - name: reddit_claudeai
    display_name: "r/ClaudeAI"
    type: reddit
    url: "https://www.reddit.com/r/ClaudeAI/top/.rss?t=week"
    weight: medium
